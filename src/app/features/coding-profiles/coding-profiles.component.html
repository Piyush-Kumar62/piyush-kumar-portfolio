<section id="coding-profiles" class="section profiles-section" aria-label="Coding Profiles">
  <div class="container">
    <div class="section-header" appScrollReveal>
      <span class="section-label">🌐 Profiles</span>
      <div class="section-divider"></div>
    </div>

    <div class="profiles-grid">
      @for (profile of profiles; track profile.platform; let i = $index) {
        <a
          [href]="profile.url"
          target="_blank"
          rel="noopener noreferrer"
          class="profile-card glass-card"
          [style.--profile-color]="profile.gradientColor"
          appScrollReveal
          [delay]="i * 120"
          [attr.id]="'profile-' + profile.platform.toLowerCase()"
          [attr.aria-label]="'Visit ' + profile.platform + ' profile'"
        >
          <div class="profile-icon" [style.color]="profile.iconColor">
            @switch (profile.platform) {
              @case ('GitHub') {
                <svg class="profile-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.2 11.38.6.11.8-.26.8-.58v-2.23c-3.34.73-4.03-1.42-4.03-1.42-.55-1.38-1.34-1.75-1.34-1.75-1.08-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .11-.78.42-1.3.76-1.6-2.67-.3-5.47-1.34-5.47-5.93 0-1.31.47-2.38 1.23-3.22-.12-.3-.53-1.52.12-3.17 0 0 1-.32 3.3 1.23.96-.27 1.98-.4 3-.4 1.02 0 2.05.13 3 .4 2.3-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.87.12 3.17.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.19.69.8.58C20.57 21.8 24 17.3 24 12 24 5.37 18.63 0 12 0z"/>
                </svg>
              }
              @case ('LinkedIn') {
                <svg class="profile-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.14 1.45-2.14 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.46v6.28zM5.34 7.43A2.06 2.06 0 1 1 5.34 3.3a2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"/>
                </svg>
              }
              @case ('LeetCode') {
                <svg class="profile-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <path fill="currentColor" d="M14.18 2.6a1.2 1.2 0 0 0-1.7 0L4.86 10.2a2.5 2.5 0 0 0 0 3.56l4.1 4.1a1.2 1.2 0 1 0 1.7-1.7l-4.1-4.1a.1.1 0 0 1 0-.16l7.62-7.61a1.2 1.2 0 0 0 0-1.7z"/>
                  <rect x="8.8" y="10.8" width="10.4" height="2.4" rx="1.2" fill="currentColor"/>
                </svg>
              }
              @default {
                <svg class="profile-icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
                </svg>
              }
            }
          </div>

          <div class="profile-body">
            <h3 class="profile-platform">{{ profile.platform }}</h3>
            <p class="profile-handle" [style.color]="profile.gradientColor">{{ profile.handle }}</p>
            <p class="profile-desc">{{ profile.desc }}</p>
          </div>

          <div class="profile-footer">
            <span class="profile-stat">{{ profile.stats }}</span>
            <span class="profile-arrow profile-link">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
              </svg>
              View Profile →
            </span>
          </div>
        </a>
      }
    </div>
  </div>
</section>
